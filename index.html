<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beautiful To-Do App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header>
      <h1>My Beautiful To-Do List</h1>
      <p>Keep your day organized with a clean todo experience: add tasks, mark them complete, filter easily, and keep progress saved automatically.</p>
    </header>

    <form class="task-form" id="taskForm">
      <input id="taskInput" type="text" placeholder="Add new task..." autocomplete="off" />
      <button type="submit">Add Task</button>
    </form>

    <div class="task-card">
      <div class="toolbar">
        <span class="status" id="taskStatus">0 tasks total</span>
        <div class="filters">
          <button type="button" data-filter="all" class="active">All</button>
          <button type="button" data-filter="active">Active</button>
          <button type="button" data-filter="completed">Completed</button>
        </div>
      </div>

      <ul class="task-list" id="taskList"></ul>

      <div class="footer">
        <span id="completedCount">0 completed</span>
        <button type="button" class="clear" id="clearCompleted">Clear Completed</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
